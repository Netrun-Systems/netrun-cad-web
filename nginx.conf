server {
  listen 8080;

  # Allow OAuth popup (accounts.google.com) to postMessage back to this opener
  # via window.opener — required for GIS Token Client / Drive sign-in popup flow.
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
